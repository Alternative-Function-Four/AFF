services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aff
      POSTGRES_PASSWORD: aff
      POSTGRES_DB: aff
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aff -d aff"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aff:aff@postgres:5432/aff
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
