model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
[mcp_servers]

[mcp_servers.MCP_DOCKER]
command = "docker"
args = ["mcp", "gateway", "run"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.serena]
args = ["--from", "git+https://github.com/oraios/serena", "serena-mcp-server", "--context", "codex", "--open-web-dashboard", "False"]
command = "uvx"

[mcp_servers.aws_mcp]
command = "uvx"
args = [
  "mcp-proxy-for-aws@latest",
  "https://aws-mcp.us-east-1.api.aws/mcp",
  "--metadata", "AWS_REGION=ap-southeast-1"
]
