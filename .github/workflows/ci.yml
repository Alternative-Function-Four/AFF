name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
      - name: Install deps
        run: |
          uv lock --project services/api
          uv sync --project services/api --locked --group dev
      - name: Run linters
        run: |
          uv run --project services/api ruff check .
          uv run --project services/api pyrefly check .
