name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://aff:aff@localhost:5432/aff
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aff
          POSTGRES_PASSWORD: aff
          POSTGRES_DB: aff
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aff -d aff"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install backend dependencies
        run: |
          uv lock --project services/api
          uv sync --project services/api --locked --group dev

      - name: Run backend lint
        run: |
          uv run --project services/api ruff check .
          uv run --project services/api pyrefly check .

      - name: Run backend tests
        run: uv run --project services/api pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix clients/app

      - name: Run frontend typecheck
        run: npm --prefix clients/app run typecheck

      - name: Run frontend tests
        run: npm --prefix clients/app run test
