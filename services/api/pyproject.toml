[project]
name = "aff-api"
version = "0.1.0"
description = "AFF API service"
readme = "../../README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi",
  "uvicorn",
  "psycopg2-binary",
  "sqlalchemy",
]

[dependency-groups]
dev = [
  "ruff",
  "pyrefly",
]

[tool.ruff]
line-length = 100
target-version = "py311"
